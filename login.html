<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — The Sharp Chair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">THE <span>SHARP</span> CHAIR</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="my_bookings.html">My Bookings</a></li>
      <li><a href="login.html" class="active">Sign In</a></li>
      <li><a href="book.html" class="nav-cta">Book Now</a></li>
    </ul>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">THE <span>SHARP</span> CHAIR</div>

      <h1 class="auth-title">SIGN IN</h1>
      <p class="auth-sub">Access your bookings and manage appointments.</p>

      <!-- Django: {% if messages %}...{% endif %} would go here -->
      <div id="login-error" class="alert alert-error" style="display:none;"></div>

      <!--
        Django form action:
        <form method="POST" action="{% url 'login' %}">
          {% csrf_token %}
      -->
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input
            type="email"
            class="form-control"
            id="login-email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input
            type="password"
            class="form-control"
            id="login-password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="button" class="btn btn-primary btn-full" onclick="doLogin()">
          Sign In
        </button>
      </div>
      <!--
        </form>
      -->

      <div class="auth-divider">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <div class="footer-logo">THE <span>SHARP</span> CHAIR</div>
    <p class="footer-copy">&copy; 2025 The Sharp Chair. All rights reserved.</p>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
    </nav>
  </footer>

  <script>
    /* Demo login — replace with Django form submit */
    function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');

      if (!email || !pass) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      const users = JSON.parse(localStorage.getItem('sharpchair_users') || '[]');
      const user  = users.find(u => u.email === email && u.password === pass);

      if (!user) {
        errEl.textContent = 'Invalid email or password. Try again.';
        errEl.style.display = 'block';
        return;
      }

      localStorage.setItem('sharpchair_current_user', JSON.stringify(user));
      window.location.href = 'my_bookings.html';
    }
  </script>

</body>
</html>
